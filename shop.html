<!DOCTYPE html>
<html lang="uk">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>FlashSmart</title>
<script src="https://telegram.org/js/telegram-web-app.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #ffffff; --surface: #f5f5f7; --border: #e5e5ea;
  --text: #1d1d1f; --text2: #86868b; --text3: #aeaeb2;
  --accent: #0071e3; --accent-light: #e8f2ff;
  --green: #34c759; --orange: #ff9500; --red: #ff3b30;
  --radius: 14px; --shadow: 0 2px 12px rgba(0,0,0,.06);
}
@media (prefers-color-scheme: dark) {
  :root {
    --bg: #000000; --surface: #1c1c1e; --border: #38383a;
    --text: #f5f5f7; --text2: #98989d; --text3: #636366;
    --accent: #0a84ff; --accent-light: #0a84ff1a;
    --shadow: 0 2px 12px rgba(0,0,0,.3);
  }
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  font-family: 'Inter', -apple-system, sans-serif;
  background: var(--bg); color: var(--text);
  -webkit-font-smoothing: antialiased;
  padding-bottom: 80px;
}
/* Header */
.header {
  position: sticky; top: 0; z-index: 50;
  background: var(--bg); backdrop-filter: blur(20px);
  padding: 12px 16px 8px; border-bottom: 1px solid var(--border);
}
.header-title { font-size: 22px; font-weight: 700; }
.header-sub { font-size: 13px; color: var(--text2); margin-top: 2px; }

/* Tabs */
.tabs {
  display: flex; gap: 0; background: var(--surface);
  border-radius: 10px; padding: 3px; margin: 12px 16px 0;
}
.tab {
  flex: 1; padding: 8px 0; text-align: center; font-size: 13px; font-weight: 600;
  border-radius: 8px; cursor: pointer; color: var(--text2);
  transition: all .2s; border: none; background: none;
}
.tab.active { background: var(--bg); color: var(--text); box-shadow: var(--shadow); }

/* Categories */
.cats {
  display: flex; gap: 8px; padding: 12px 16px; overflow-x: auto;
  scrollbar-width: none; -ms-overflow-style: none;
}
.cats::-webkit-scrollbar { display: none; }
.cat-btn {
  flex-shrink: 0; padding: 8px 16px; border-radius: 20px;
  font-size: 13px; font-weight: 500; cursor: pointer;
  border: 1px solid var(--border); background: var(--bg); color: var(--text2);
  transition: all .2s;
}
.cat-btn.active { background: var(--accent); color: #fff; border-color: var(--accent); }

/* Product cards */
.products { padding: 0 16px 16px; }
.product-card {
  display: flex; align-items: center; gap: 14px;
  padding: 14px; margin-bottom: 8px;
  background: var(--surface); border-radius: var(--radius);
  transition: transform .15s;
}
.product-card:active { transform: scale(.98); }
.product-icon {
  width: 48px; height: 48px; border-radius: 12px;
  background: var(--accent-light); display: flex; align-items: center; justify-content: center;
  font-size: 22px; flex-shrink: 0;
}
.product-info { flex: 1; min-width: 0; }
.product-name { font-size: 14px; font-weight: 600; line-height: 1.3; }
.product-stock { font-size: 12px; color: var(--text2); margin-top: 2px; }
.product-price { font-size: 16px; font-weight: 700; color: var(--accent); white-space: nowrap; }
.product-unit { font-size: 11px; color: var(--text2); }
.product-right { text-align: right; flex-shrink: 0; }
.add-btn {
  width: 32px; height: 32px; border-radius: 50%; border: none;
  background: var(--accent); color: #fff; font-size: 20px; font-weight: 500;
  cursor: pointer; margin-top: 6px; display: flex; align-items: center; justify-content: center;
  transition: transform .15s;
}
.add-btn:active { transform: scale(.9); }

/* Qty control */
.qty-control {
  display: flex; align-items: center; gap: 8px; margin-top: 6px;
}
.qty-btn {
  width: 28px; height: 28px; border-radius: 50%; border: none;
  background: var(--surface); color: var(--text); font-size: 16px; font-weight: 600;
  cursor: pointer; display: flex; align-items: center; justify-content: center;
  border: 1px solid var(--border);
}
.qty-val { font-size: 15px; font-weight: 600; min-width: 20px; text-align: center; }

/* Cart */
.cart-bar {
  position: fixed; bottom: 0; left: 0; right: 0; z-index: 100;
  background: var(--accent); color: #fff; padding: 16px 20px;
  display: none; align-items: center; justify-content: space-between;
  cursor: pointer; font-weight: 600;
  box-shadow: 0 -4px 20px rgba(0,113,227,.3);
}
.cart-bar.show { display: flex; }
.cart-count {
  background: rgba(255,255,255,.25); padding: 2px 10px; border-radius: 12px;
  font-size: 13px; margin-left: 8px;
}

/* Cart page */
.cart-page { padding: 16px; display: none; }
.cart-page.active { display: block; }
.cart-item {
  display: flex; align-items: center; gap: 12px;
  padding: 14px; margin-bottom: 8px;
  background: var(--surface); border-radius: var(--radius);
}
.cart-item-info { flex: 1; }
.cart-item-name { font-size: 14px; font-weight: 500; }
.cart-item-price { font-size: 13px; color: var(--text2); margin-top: 2px; }
.cart-item-sum { font-size: 15px; font-weight: 700; color: var(--accent); }
.cart-remove {
  color: var(--red); font-size: 12px; cursor: pointer;
  background: none; border: none; padding: 4px 8px;
}
.cart-total {
  display: flex; justify-content: space-between; align-items: center;
  padding: 16px; margin-top: 8px; background: var(--surface);
  border-radius: var(--radius); font-weight: 600;
}
.cart-total-sum { font-size: 20px; color: var(--accent); }
.order-btn {
  width: 100%; padding: 16px; margin-top: 12px;
  background: var(--accent); color: #fff; border: none;
  border-radius: var(--radius); font-size: 16px; font-weight: 600;
  cursor: pointer; transition: opacity .15s;
}
.order-btn:active { opacity: .8; }
.order-btn:disabled { opacity: .5; cursor: default; }

/* Orders page */
.orders-page { padding: 16px; display: none; }
.orders-page.active { display: block; }
.order-card {
  padding: 14px; margin-bottom: 10px;
  background: var(--surface); border-radius: var(--radius);
}
.order-head {
  display: flex; justify-content: space-between; align-items: center;
  margin-bottom: 8px;
}
.order-num { font-size: 15px; font-weight: 600; }
.order-date { font-size: 12px; color: var(--text2); }
.order-items { font-size: 13px; color: var(--text2); line-height: 1.6; }
.order-total { font-size: 15px; font-weight: 700; color: var(--accent); margin-top: 8px; }

/* Debt banner */
.debt-banner {
  margin: 12px 16px; padding: 14px 16px;
  background: linear-gradient(135deg, #ff3b3022, #ff950022);
  border: 1px solid #ff3b3033; border-radius: var(--radius);
  display: none;
}
.debt-banner.show { display: block; }
.debt-label { font-size: 12px; color: var(--text2); }
.debt-amount { font-size: 22px; font-weight: 700; color: var(--red); }
.debt-due { font-size: 12px; color: var(--orange); margin-top: 4px; }

/* Empty state */
.empty { text-align: center; padding: 60px 20px; color: var(--text2); }
.empty-icon { font-size: 48px; margin-bottom: 12px; }
.empty-text { font-size: 14px; }

/* Loading */
.loading { text-align: center; padding: 60px; }
.spinner {
  width: 32px; height: 32px; border: 3px solid var(--border);
  border-top-color: var(--accent); border-radius: 50%;
  animation: spin .6s linear infinite; margin: 0 auto 12px;
}
@keyframes spin { to { transform: rotate(360deg); } }

/* Toast */
.toast {
  position: fixed; bottom: 90px; left: 50%; transform: translateX(-50%);
  background: var(--text); color: var(--bg); padding: 10px 20px;
  border-radius: 20px; font-size: 13px; font-weight: 500;
  opacity: 0; transition: opacity .3s; z-index: 200; pointer-events: none;
}
.toast.show { opacity: 1; }

/* Page sections */
.page-section { display: none; }
.page-section.active { display: block; }
</style>
</head>
<body>

<div class="header">
  <div style="display:flex;justify-content:space-between;align-items:center">
    <div>
      <div class="header-title">FlashSmart</div>
      <div class="header-sub" id="client-info">Завантаження...</div>
    </div>
    <a id="manager-phone-link" href="tel:0982831328" style="display:flex;align-items:center;gap:4px;padding:6px 12px;background:var(--accent-light);border-radius:10px;text-decoration:none;color:var(--accent);font-size:12px;font-weight:600">
      📞 Менеджер
    </a>
  </div>
</div>

<div class="tabs">
  <button class="tab active" onclick="showTab('catalog')">🛒 Каталог</button>
  <button class="tab" onclick="showTab('cart')">🧾 Кошик <span id="tab-cart-count"></span></button>
  <button class="tab" onclick="showTab('orders')">📋 Замовлення</button>
</div>

<div class="debt-banner" id="debt-banner">
  <div class="debt-label">Ваш борг</div>
  <div class="debt-amount" id="debt-amount">$0</div>
  <div class="debt-due" id="debt-due"></div>
</div>

<!-- CATALOG -->
<div class="page-section active" id="page-catalog">
  <div style="padding:12px 16px 0">
    <input type="text" id="search-input" placeholder="🔍 Пошук товару..." oninput="onSearch()" style="width:100%;padding:10px 14px;border-radius:10px;border:1px solid var(--border);background:var(--surface);color:var(--text);font-size:14px;outline:none;font-family:inherit">
  </div>
  <div class="cats" id="cats"></div>
  <div class="products" id="products-list">
    <div class="loading"><div class="spinner"></div><div style="color:var(--text2);font-size:13px">Завантаження каталогу...</div></div>
  </div>
</div>

<!-- CART -->
<div class="page-section" id="page-cart">
  <div class="cart-page active" id="cart-content"></div>
</div>

<!-- ORDERS -->
<div class="page-section" id="page-orders">
  <div class="orders-page active" id="orders-content"></div>
</div>

<div class="cart-bar" id="cart-bar" onclick="showTab('cart')">
  <span>🛒 Кошик <span class="cart-count" id="cart-badge">0</span></span>
  <span id="cart-bar-total">$0</span>
</div>

<div class="toast" id="toast"></div>

<script>
const tg = window.Telegram?.WebApp;
if(tg) tg.ready();
const tgUser = tg?.initDataUnsafe?.user;
console.log('TG WebApp:', tg ? 'yes' : 'no');
console.log('TG User:', tgUser ? JSON.stringify(tgUser) : 'null');
console.log('initData:', tg?.initData?.slice(0,50));

const FB_URL = 'https://sklad-oblik-default-rtdb.europe-west1.firebasedatabase.app/sklad';
const FB_API_KEY = 'AIzaSyDoNn7dp7weo78H02Yf0IDBzF168uQELTY';
// Public read-only account for Mini App. Permissions are enforced server-side via Firebase rules.
const SHOP_EMAIL = 'shop@flashsmart.local';
const SHOP_PASS = 'ShopReader2026!flash';

let _token = localStorage.getItem('shop_id_token') || null;
let db = {};
let cart = [];
let clientRec = null;

async function fbAuth(){
  const r = await fetch(`https://identitytoolkit.googleapis.com/v1/accounts:signInWithPassword?key=${FB_API_KEY}`, {
    method:'POST', headers:{'Content-Type':'application/json'},
    body: JSON.stringify({email:SHOP_EMAIL, password:SHOP_PASS, returnSecureToken:true})
  });
  const d = await r.json();
  if(!r.ok) throw new Error(d.error?.message || 'shop auth failed');
  _token = d.idToken;
  localStorage.setItem('shop_id_token', d.idToken);
  if(d.refreshToken) localStorage.setItem('shop_refresh_token', d.refreshToken);
}

async function fbRefresh(){
  const rt = localStorage.getItem('shop_refresh_token');
  if(!rt) return false;
  try{
    const r = await fetch(`https://securetoken.googleapis.com/v1/token?key=${FB_API_KEY}`, {
      method:'POST', headers:{'Content-Type':'application/x-www-form-urlencoded'},
      body: `grant_type=refresh_token&refresh_token=${rt}`
    });
    const d = await r.json();
    if(!r.ok) return false;
    _token = d.id_token;
    localStorage.setItem('shop_id_token', d.id_token);
    if(d.refresh_token) localStorage.setItem('shop_refresh_token', d.refresh_token);
    return true;
  } catch(e){ return false; }
}

// Helper: GET path with 401 retry
async function fbGetPath(path){
  if(!_token) await fbAuth();
  let r = await fetch(`${FB_URL}/${path}.json?auth=${_token}`);
  if(r.status === 401){
    if(!(await fbRefresh())) await fbAuth();
    r = await fetch(`${FB_URL}/${path}.json?auth=${_token}`);
  }
  if(!r.ok) return null;
  return r.json();
}

// Helper: PATCH path with 401 retry
async function fbPatchPath(path, data){
  if(!_token) await fbAuth();
  const url = path ? `${FB_URL}/${path}.json?auth=${_token}` : `${FB_URL}.json?auth=${_token}`;
  const opts = {
    method:'PATCH', headers:{'Content-Type':'application/json'},
    body: JSON.stringify(data)
  };
  let r = await fetch(url, opts);
  if(r.status === 401){
    if(!(await fbRefresh())) await fbAuth();
    const url2 = path ? `${FB_URL}/${path}.json?auth=${_token}` : `${FB_URL}.json?auth=${_token}`;
    r = await fetch(url2, opts);
  }
  return r;
}

// Helper: PUT path with 401 retry
async function fbPutPath(path, data){
  if(!_token) await fbAuth();
  const url = `${FB_URL}/${path}.json?auth=${_token}`;
  const opts = {
    method:'PUT', headers:{'Content-Type':'application/json'},
    body: JSON.stringify(data)
  };
  let r = await fetch(url, opts);
  if(r.status === 401){
    if(!(await fbRefresh())) await fbAuth();
    r = await fetch(`${FB_URL}/${path}.json?auth=${_token}`, opts);
  }
  return r;
}

// Compat: fbGet returns same shape as before, but via parallel scoped reads
async function fbGet(){
  if(!_token) await fbAuth();
  const paths = ['products','invoices','payments','_config','nextInvNum'];
  const results = await Promise.all(paths.map(p => fbGetPath(p)));
  return {
    products: results[0],
    invoices: results[1],
    payments: results[2],
    _config: results[3],
    nextInvNum: results[4]
  };
}

// Compat: fbPatch for root-level writes — route to individual paths
async function fbPatch(data){
  const tasks = [];
  for(const key of Object.keys(data)){
    tasks.push(fbPutPath(key, data[key]));
  }
  const results = await Promise.all(tasks);
  return results;
}

function toArr(obj){ return obj ? (Array.isArray(obj) ? obj : Object.values(obj)) : []; }

// HTML escape helper — use for any user/admin-entered data injected via innerHTML
function esc(s){
  return String(s == null ? '' : s)
    .replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')
    .replace(/"/g,'&quot;').replace(/'/g,'&#39;');
}

function getStock(pid){
  const p = db.products.find(x=>x.id===pid);
  if(!p) return 0;
  const sold = db.invoices.reduce((s,inv)=>{
    return s + (inv.items||[]).filter(i=>i.productId===pid).reduce((ss,i)=>ss+i.qty,0);
  },0);
  return (p.income||0) - sold;
}

function getPrice(p){
  const lvl = clientRec ? (clientRec.priceLevel || 'd2') : 'd2';
  const map = {gurt:'priceGurt',d1:'priceD1',d2:'priceD2'};
  const unitPrice = p[map[lvl]] || p.priceD2 || 0;
  const pcs = p.pcsPerPack || 1;
  return Math.round(unitPrice * pcs * 100) / 100;
}

const catIcons = {'Захисне скло':'🛡','Кабелі':'🔌','МЗП':'🔋','Навушники':'🎧'};
const CAT_ORDER = ['Захисне скло','Кабелі','МЗП','Навушники'];
let activeCat = 'all';

// Scoped query: find single client by field=value (uses Firebase index)
async function queryClientBy(field, value){
  if(!_token) await fbAuth();
  const url = `${FB_URL}/clients.json?auth=${_token}&orderBy=${encodeURIComponent('"'+field+'"')}&equalTo=${encodeURIComponent('"'+value+'"')}`;
  let r = await fetch(url);
  if(r.status === 401){
    if(!(await fbRefresh())) await fbAuth();
    r = await fetch(`${FB_URL}/clients.json?auth=${_token}&orderBy=${encodeURIComponent('"'+field+'"')}&equalTo=${encodeURIComponent('"'+value+'"')}`);
  }
  if(!r.ok) return null;
  const data = await r.json();
  if(!data) return null;
  const arr = Array.isArray(data) ? data.filter(Boolean) : Object.values(data);
  return arr[0] || null;
}

async function findClient(){
  // Try tgUser from initDataUnsafe
  if(tgUser){
    console.log('Looking for telegramId:', tgUser.id);
    const found = await queryClientBy('telegramId', String(tgUser.id));
    if(found) return found;
  }
  // Fallback: parse initData manually
  if(tg?.initData){
    try {
      const params = new URLSearchParams(tg.initData);
      const userStr = params.get('user');
      if(userStr){
        const userData = JSON.parse(userStr);
        const found = await queryClientBy('telegramId', String(userData.id));
        if(found) return found;
      }
    } catch(e){}
  }
  // Fallback: cookie
  try {
    const match = document.cookie.match(/fs_clientId=([^;]+)/);
    if(match){
      const found = await queryClientBy('id', match[1]);
      if(found){ console.log('Client from cookie:', found.name); return found; }
    }
  } catch(e){}
  console.log('No client matched.');
  return null;
}

async function init(){
  try {
    const raw = await fbGet();
    db.products = toArr(raw.products);
    db.invoices = toArr(raw.invoices);
    db.payments = toArr(raw.payments);
    db.clients = []; // populated on-demand via scoped queries (rules forbid reading all)
    db.returns = toArr(raw.returns);
    db.nextInvNum = raw.nextInvNum || 1;
    
    // Load manager phone from config
    const cfg = raw._config || {};
    if(cfg.managerPhone){
      let ph = String(cfg.managerPhone);
      if(ph.length === 9 && ph[0] !== '0') ph = '0' + ph;
      const formatted = ph.startsWith('0') ? '+38' + ph : ph;
      const link = document.getElementById('manager-phone-link');
      if(link) link.href = 'tel:' + formatted;
    }
    
    clientRec = await findClient();
    if(clientRec){
      document.getElementById('client-info').textContent = clientRec.name;
      showDebt();
      renderCats();
      renderProducts();
      renderOrders();
    } else {
      document.getElementById('client-info').innerHTML = '<span onclick="identifyByPhone()" style="cursor:pointer;color:var(--accent);text-decoration:underline">Натисніть для ідентифікації</span>';
      document.getElementById('products-list').innerHTML = `
        <div class="empty" style="padding:40px 20px">
          <div class="empty-icon">🔒</div>
          <div class="empty-text" style="margin-bottom:16px">Для доступу до каталогу потрібна ідентифікація</div>
          <button onclick="identifyByPhone()" style="padding:12px 24px;background:var(--accent);color:#fff;border:none;border-radius:10px;font-size:15px;font-weight:600;cursor:pointer">📱 Ввести номер телефону</button>
        </div>`;
    }
  } catch(e){
    document.getElementById('products-list').innerHTML = '<div class="empty"><div class="empty-icon">⚠️</div><div class="empty-text">Помилка завантаження</div></div>';
  }
}

function showDebt(){
  if(!clientRec) return;
  const sold = db.invoices.filter(i=>i.clientId===clientRec.id).reduce((s,i)=>s+(i.total||0),0);
  const paid = (db.payments||[]).filter(p=>p.clientId===clientRec.id).reduce((s,p)=>s+(p.amount||0),0);
  const ret = (db.returns||[]).filter(r=>r.clientId===clientRec.id&&r.type==='return').reduce((s,r)=>s+(r.sum||0),0);
  const debt = sold - paid - ret;
  if(debt > 0.01){
    document.getElementById('debt-banner').classList.add('show');
    document.getElementById('debt-amount').textContent = '$' + debt.toFixed(2);
    const deferDays = clientRec.deferDays || 0;
    if(deferDays){
      // Find oldest unpaid invoice due date
      const invsAsc = db.invoices.filter(i=>i.clientId===clientRec.id).sort((a,b)=>a.date.localeCompare(b.date));
      let rem = paid + ret;
      for(const inv of invsAsc){
        if(rem >= inv.total){ rem -= inv.total; continue; }
        const d = new Date(inv.date);
        d.setDate(d.getDate() + deferDays);
        const dueStr = d.toLocaleDateString('uk-UA');
        const overdue = new Date().toISOString().slice(0,10) > d.toISOString().slice(0,10);
        document.getElementById('debt-due').textContent = (overdue ? '⚠ Прострочено! ' : '') + 'Термін: ' + dueStr;
        if(overdue) document.getElementById('debt-due').style.color = 'var(--red)';
        break;
      }
    }
  }
}

function renderCats(){
  const cats = [...new Set(db.products.map(p=>p.category))].sort((a,b)=>{
    return (CAT_ORDER.indexOf(a)===-1?99:CAT_ORDER.indexOf(a)) - (CAT_ORDER.indexOf(b)===-1?99:CAT_ORDER.indexOf(b));
  });
  document.getElementById('cats').innerHTML = 
    `<button class="cat-btn ${activeCat==='all'?'active':''}" onclick="setCat('all')">Все</button>` +
    cats.map(c=>`<button class="cat-btn ${activeCat===c?'active':''}" onclick="setCat('${c}')">${catIcons[c]||'📦'} ${c}</button>`).join('');
}

function setCat(c){ activeCat = c; renderCats(); renderProducts(); }

function onSearch(){
  const search = (document.getElementById('search-input')?.value||'').trim();
  if(search){ activeCat = 'all'; renderCats(); }
  renderProducts();
}

function renderProducts(){
  const search = (document.getElementById('search-input')?.value||'').toLowerCase().trim();
  let filtered = activeCat === 'all' ? db.products : db.products.filter(p=>p.category===activeCat);
  if(search){
    filtered = filtered.filter(p=>p.name.toLowerCase().includes(search));
  }
  const withStock = filtered.map(p=>({...p, stock: getStock(p.id), price: getPrice(p)}));
  
  if(!withStock.length){
    document.getElementById('products-list').innerHTML = '<div class="empty"><div class="empty-icon">📦</div><div class="empty-text">Немає товарів</div></div>';
    return;
  }
  
  document.getElementById('products-list').innerHTML = withStock.map(p=>{
    const pcs = p.pcsPerPack || 1;
    const unit = pcs > 1 ? `/уп (${pcs}шт)` : '/шт';
    const packs = pcs > 1 ? Math.floor(p.stock / pcs) : p.stock;
    
    // 3-level availability badge (hides exact quantity for competitive reasons)
    let stockBadge;
    if(packs <= 0){
      stockBadge = `<div class="product-stock" style="color:#999">● Немає в наявності</div>`;
    } else if(packs <= 10){
      stockBadge = `<div class="product-stock" style="color:#ff9500">● Залишилось мало</div>`;
    } else {
      stockBadge = `<div class="product-stock" style="color:#34c759">● В наявності</div>`;
    }
    
    const inCart = cart.find(c=>String(c.id)===String(p.id));
    const icon = catIcons[p.category] || '📦';
    
    return `<div class="product-card"${packs<=0?' style="opacity:.55"':''}>
      <div class="product-icon">${icon}</div>
      <div class="product-info">
        <div class="product-name">${esc(p.name)}</div>
        ${stockBadge}
      </div>
      <div class="product-right">
        <div class="product-price">$${p.price.toFixed(2)}</div>
        <div class="product-unit">${unit}</div>
        ${packs <= 0
          ? ''
          : inCart 
            ? `<div class="qty-control">
                <button class="qty-btn" onclick="changeQty('${p.id}',-1)">−</button>
                <span class="qty-val" onclick="setQtyManual('${p.id}')" style="cursor:pointer;border-bottom:1px dashed var(--text2)">${inCart.qty}</span>
                <button class="qty-btn" onclick="changeQty('${p.id}',1)">+</button>
              </div>`
            : `<button class="add-btn" onclick="addToCart('${p.id}')">+</button>`
        }
      </div>
    </div>`;
  }).join('');
}

function addToCart(pid){
  const p = db.products.find(x=>String(x.id)===String(pid));
  if(!p) return;
  cart.push({ id: p.id, name: p.name, price: getPrice(p), qty: 1, pcsPerPack: p.pcsPerPack||1 });
  updateCart();
  toast('Додано: ' + p.name);
}

function changeQty(pid, delta){
  const item = cart.find(c=>String(c.id)===String(pid));
  if(!item) return;
  item.qty += delta;
  if(item.qty <= 0) cart = cart.filter(c=>String(c.id)!==String(pid));
  updateCart();
}

function removeFromCart(pid){
  cart = cart.filter(c=>String(c.id)!==String(pid));
  updateCart();
}

function setQtyManual(pid){
  const item = cart.find(c=>String(c.id)===String(pid));
  if(!item) return;
  const val = window.prompt(`Кількість для "${item.name}":`, item.qty);
  if(val === null) return;
  const num = parseInt(val);
  if(isNaN(num) || num < 0) return;
  if(num === 0){
    cart = cart.filter(c=>String(c.id)!==String(pid));
  } else {
    item.qty = num;
  }
  updateCart();
}

function updateCart(){
  const total = cart.reduce((s,c)=>s+c.price*c.qty,0);
  const count = cart.reduce((s,c)=>s+c.qty,0);
  
  document.getElementById('cart-badge').textContent = count;
  document.getElementById('tab-cart-count').textContent = count ? `(${count})` : '';
  document.getElementById('cart-bar-total').textContent = '$' + total.toFixed(2);
  
  const bar = document.getElementById('cart-bar');
  if(count > 0 && !document.getElementById('page-cart').classList.contains('active')){
    bar.classList.add('show');
  } else {
    bar.classList.remove('show');
  }
  
  renderProducts();
  renderCartPage();
}

function renderCartPage(){
  const el = document.getElementById('cart-content');
  if(!cart.length){
    el.innerHTML = '<div class="empty"><div class="empty-icon">🛒</div><div class="empty-text">Кошик порожній</div></div>';
    return;
  }
  const total = cart.reduce((s,c)=>s+c.price*c.qty,0);
  el.innerHTML = cart.map(c=>{
    const unit = c.pcsPerPack > 1 ? 'уп' : 'шт';
    return `<div class="cart-item">
      <div class="cart-item-info">
        <div class="cart-item-name">${esc(c.name)}</div>
        <div class="cart-item-price">$${c.price.toFixed(2)} × ${c.qty} ${unit}</div>
      </div>
      <div style="display:flex;align-items:center;gap:12px">
        <div class="cart-item-sum">$${(c.price*c.qty).toFixed(2)}</div>
        <div class="qty-control" style="margin-top:0">
          <button class="qty-btn" onclick="changeQty('${c.id}',-1)">−</button>
          <span class="qty-val" onclick="setQtyManual('${c.id}')" style="cursor:pointer;border-bottom:1px dashed var(--text2)">${c.qty}</span>
          <button class="qty-btn" onclick="changeQty('${c.id}',1)">+</button>
        </div>
        <button class="cart-remove" onclick="removeFromCart('${c.id}')">✕</button>
      </div>
    </div>`;
  }).join('') +
  `<div class="cart-total">
    <span>Разом</span>
    <span class="cart-total-sum">$${total.toFixed(2)}</span>
  </div>
  <button class="order-btn" id="order-btn" onclick="submitOrder()" ${!clientRec?'disabled':''}>
    ${clientRec ? '✓ Оформити замовлення' : '⚠ Клієнт не ідентифікований'}
  </button>`;
}

async function submitOrder(){
  if(!clientRec || !cart.length) return;

  // Rate limit: 3 seconds between order attempts (per browser)
  const lastOrder = parseInt(localStorage.getItem('last_order_ts') || '0', 10);
  const now = Date.now();
  if(now - lastOrder < 3000){
    const wait = Math.ceil((3000 - (now - lastOrder)) / 1000);
    toast(`⏳ Зачекайте ${wait} сек...`);
    return;
  }
  localStorage.setItem('last_order_ts', String(now));

  const btn = document.getElementById('order-btn');
  btn.disabled = true;
  btn.textContent = '⏳ Оформлення...';
  
  try {
    // Reload DB for fresh data
    const raw = await fbGet();
    const invoices = toArr(raw.invoices);
    const nextNum = raw.nextInvNum || 1;
    
    const invId = Date.now();
    const today = new Date().toISOString().slice(0,10);
    const priceLevel = clientRec.priceLevel || 'd2';
    
    const items = cart.map(c=>({
      productId: c.id,
      qty: c.qty * c.pcsPerPack,
      packs: c.qty,
      price: c.price,
      sum: Math.round(c.price * c.qty * 100) / 100
    }));
    const total = items.reduce((s,i)=>s+i.sum, 0);
    
    const inv = {
      id: invId, num: nextNum,
      clientId: clientRec.id,
      date: today, items, total,
      priceLevel, source: 'miniapp'
    };
    
    invoices.push(inv);
    await fbPatch({ invoices, nextInvNum: nextNum + 1 });
    
    cart = [];
    db.invoices = invoices;
    db.nextInvNum = nextNum + 1;
    
    updateCart();
    renderOrders();
    showDebt();
    showTab('orders');
    toast('✅ Замовлення #' + String(nextNum).padStart(4,'0') + ' створено!');
    
    // Notify bot owner via Telegram Bot API
    notifyOwner(nextNum, total, items);
    
  } catch(e){
    toast('❌ Помилка: ' + e.message);
    btn.disabled = false;
    btn.textContent = '✓ Оформити замовлення';
  }
}

async function notifyOwner(invNum, total, items){
  try {
    // Read bot config from Firebase /sklad/_config
    if(!_token) await fbAuth();
    let cfgR = await fetch(`${FB_URL}/_config.json?auth=${_token}`);
    if(cfgR.status === 401){
      if(!(await fbRefresh())) await fbAuth();
      cfgR = await fetch(`${FB_URL}/_config.json?auth=${_token}`);
    }
    const cfg = await cfgR.json();
    if(!cfg || !cfg.botToken || !cfg.ownerId) return;
    
    const itemLines = items.map(i=>{
      const p = db.products.find(x=>String(x.id)===String(i.productId));
      const pcs = p ? (p.pcsPerPack||1) : 1;
      const unit = pcs > 1 ? `${i.packs} уп` : `${i.qty} шт`;
      return `• ${p?p.name:'?'} — ${unit} — $${i.sum.toFixed(2)}`;
    }).join('\n');
    
    const text = `📱 Нове замовлення з Mini App!\n\n` +
      `👤 ${clientRec.name}\n` +
      `📋 Накладна #${String(invNum).padStart(4,'0')}\n\n` +
      `${itemLines}\n\n` +
      `💰 Сума: $${total.toFixed(2)}`;
    
    await fetch(`https://api.telegram.org/bot${cfg.botToken}/sendMessage`, {
      method: 'POST',
      headers: {'Content-Type':'application/json'},
      body: JSON.stringify({ chat_id: cfg.ownerId, text })
    });
  } catch(e){
    console.log('Notify error:', e);
  }
}

function calcInvoicePaidStatus(){
  // Calculate paid amount per invoice using targeted payments + FIFO
  if(!clientRec) return {};
  const result = {};
  const clientInvs = db.invoices.filter(i=>String(i.clientId)===String(clientRec.id))
    .sort((a,b)=>(a.date||'').localeCompare(b.date||''));
  
  // Collect targeted payments
  const targeted = {};
  let unattachedPool = 0;
  (db.payments||[]).filter(p=>String(p.clientId)===String(clientRec.id) && (p.amount||0)>0).forEach(p=>{
    if(p.invoiceId){
      const k = String(p.invoiceId);
      targeted[k] = (targeted[k]||0) + p.amount;
    } else {
      unattachedPool += p.amount;
    }
  });
  (db.returns||[]).filter(r=>String(r.clientId)===String(clientRec.id) && r.type==='return').forEach(r=>{
    if(r.invoiceId){
      const k = String(r.invoiceId);
      targeted[k] = (targeted[k]||0) + (r.sum||0);
    } else {
      unattachedPool += (r.sum||0);
    }
  });
  
  let remaining = unattachedPool;
  clientInvs.forEach(inv=>{
    const total = inv.total||0;
    const t = targeted[String(inv.id)] || 0;
    let paid = Math.min(t, total);
    let rem = total - paid;
    if(rem > 0 && remaining > 0){
      const fromPool = Math.min(remaining, rem);
      paid += fromPool;
      rem -= fromPool;
      remaining -= fromPool;
    }
    result[String(inv.id)] = { paid, debt: rem, total };
  });
  return result;
}

function renderOrders(){
  const el = document.getElementById('orders-content');
  if(!clientRec){
    el.innerHTML = '<div class="empty"><div class="empty-icon">📋</div><div class="empty-text">Увійдіть для перегляду замовлень</div></div>';
    return;
  }
  const invs = db.invoices.filter(i=>i.clientId===clientRec.id).sort((a,b)=>(b.num||0)-(a.num||0));
  if(!invs.length){
    el.innerHTML = '<div class="empty"><div class="empty-icon">📋</div><div class="empty-text">Замовлень поки немає</div></div>';
    return;
  }
  const paidStatus = calcInvoicePaidStatus();
  el.innerHTML = invs.map(inv=>{
    const items = (inv.items||[]).map(item=>{
      const p = db.products.find(x=>x.id===item.productId);
      const pcs = p ? (p.pcsPerPack||1) : 1;
      const unit = pcs > 1 ? `${item.packs||1} уп` : `${item.qty} шт`;
      return `${p?esc(p.name):'?'} — ${unit} — $${(item.sum||0).toFixed(2)}`;
    }).join('<br>');
    const d = new Date(inv.date).toLocaleDateString('uk-UA');
    const src = inv.source === 'telegram' ? '🤖' : inv.source === 'miniapp' ? '📱' : '💻';
    const st = paidStatus[String(inv.id)] || { paid: 0, debt: inv.total||0 };
    const isPaid = st.debt < 0.01;
    const isPartial = !isPaid && st.paid > 0.01;
    const statusBadge = isPaid
      ? `<span style="display:inline-block;padding:3px 10px;background:#34c75920;color:#34c759;border-radius:10px;font-size:11px;font-weight:600">✓ Сплачено</span>`
      : isPartial
        ? `<span style="display:inline-block;padding:3px 10px;background:#ff950020;color:#ff9500;border-radius:10px;font-size:11px;font-weight:600">Частково: борг $${st.debt.toFixed(2)}</span>`
        : `<span style="display:inline-block;padding:3px 10px;background:#ff3b3020;color:#ff3b30;border-radius:10px;font-size:11px;font-weight:600">Борг $${st.debt.toFixed(2)}</span>`;
    return `<div class="order-card">
      <div class="order-head">
        <span class="order-num">${src} #${String(inv.num).padStart(4,'0')}</span>
        <span class="order-date">${d}</span>
      </div>
      <div class="order-items">${items}</div>
      <div style="margin-top:8px">${statusBadge}</div>
      <div style="display:flex;justify-content:space-between;align-items:center;margin-top:8px">
        <div class="order-total" style="margin:0">$${(inv.total||0).toFixed(2)}</div>
        <button onclick="repeatOrder(${inv.id})" style="padding:6px 14px;background:var(--accent);color:#fff;border:none;border-radius:8px;font-size:12px;font-weight:600;cursor:pointer">🔄 Повторити</button>
      </div>
    </div>`;
  }).join('');
}

function repeatOrder(invId){
  const inv = db.invoices.find(i=>i.id===invId);
  if(!inv) return;
  let added = 0;
  (inv.items||[]).forEach(item=>{
    const p = db.products.find(x=>String(x.id)===String(item.productId));
    if(!p) return;
    const stock = getStock(p.id);
    if(stock <= 0) return;
    const existing = cart.find(c=>String(c.id)===String(p.id));
    const pcs = p.pcsPerPack || 1;
    const qty = pcs > 1 ? (item.packs || 1) : item.qty;
    if(existing){
      existing.qty = qty;
    } else {
      cart.push({ id: p.id, name: p.name, price: getPrice(p), qty: qty, pcsPerPack: pcs });
    }
    added++;
  });
  if(added){
    updateCart();
    showTab('cart');
    toast('🔄 Додано ' + added + ' поз. в кошик');
  } else {
    toast('❌ Товарів з цього замовлення немає в наявності');
  }
}

function showTab(name){
  document.querySelectorAll('.tab').forEach((t,i)=>{
    t.classList.toggle('active', ['catalog','cart','orders'][i]===name);
  });
  document.querySelectorAll('.page-section').forEach(p=>p.classList.remove('active'));
  document.getElementById('page-'+name).classList.add('active');
  
  const bar = document.getElementById('cart-bar');
  if(name === 'cart') bar.classList.remove('show');
  else if(cart.length) bar.classList.add('show');
  
  if(name==='cart') renderCartPage();
}

function toast(msg){
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.classList.add('show');
  setTimeout(()=>el.classList.remove('show'), 2000);
}

// Find Firebase key (array index or object key) for a client by field=value
async function findClientKey(field, value){
  if(!_token) await fbAuth();
  const url = `${FB_URL}/clients.json?auth=${_token}&orderBy=${encodeURIComponent('"'+field+'"')}&equalTo=${encodeURIComponent('"'+value+'"')}`;
  let r = await fetch(url);
  if(r.status === 401){
    if(!(await fbRefresh())) await fbAuth();
    r = await fetch(url);
  }
  if(!r.ok) return null;
  const data = await r.json();
  if(!data) return null;
  // Firebase returns {"<key>": {...clientData}} — we need that key
  const keys = Object.keys(data);
  return keys[0] || null;
}

async function identifyByPhone(){
  const phone = window.prompt('Введіть ваш номер телефону:');
  if(!phone) return;
  const clean = phone.replace(/\D/g,'');
  // Try full number, then with leading 0 if user entered 9 digits
  let found = await queryClientBy('phoneNorm', clean);
  if(!found && clean.length === 9) found = await queryClientBy('phoneNorm', '0' + clean);
  if(!found && clean.length === 12 && clean.startsWith('380')) found = await queryClientBy('phoneNorm', '0' + clean.slice(3));
  if(found){
    clientRec = found;
    document.getElementById('client-info').textContent = found.name;
    if(tgUser && !found.telegramId){
      found.telegramId = tgUser.id;
      // Find the correct Firebase key (not client.id) to write to the right record
      try {
        const key = await findClientKey('id', found.id);
        if(key !== null){
          await fbPatchPath('clients/' + encodeURIComponent(key), {telegramId: tgUser.id});
        }
      } catch(e){ console.warn('telegramId save failed:', e); }
    }
    try { document.cookie = 'fs_clientId=' + found.id + ';max-age=31536000;path=/'; } catch(e){}
    showDebt();
    renderCats();
    renderProducts();
    renderOrders();
    toast('✅ ' + found.name);
  } else {
    toast('❌ Номер не знайдено');
  }
}
